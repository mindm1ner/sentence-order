<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>문장 순서 맞추기</title>
<style>
  :root{
    --bg:#f6f5f1; --card:#ffffff; --ink:#2b2a27; --sub:#8a877f;
    --line:#e7e4dc; --accent:#3a7d5d; --accent-soft:#e4f0e9;
    --ok:#3a7d5d; --ok-bg:#e4f0e9; --no:#c0584b; --no-bg:#f7e6e3;
    --warn:#c98a2b; --warn-bg:#f8efdd;
    --shadow:0 1px 2px rgba(0,0,0,.04),0 6px 18px rgba(0,0,0,.05);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    line-height:1.6}
  .wrap{max-width:640px;margin:0 auto;padding:24px 18px 90px}
  header{text-align:center;margin:8px 0 22px}
  header h1{font-size:20px;margin:0;letter-spacing:-.02em}
  header p{font-size:13px;color:var(--sub);margin:6px 0 0}

  label{display:block;font-size:13px;color:var(--sub);margin:14px 2px 5px}
  input,textarea{width:100%;border:1px solid var(--line);border-radius:11px;
    padding:12px 13px;font-size:15px;font-family:inherit;background:var(--card);color:var(--ink)}
  textarea{resize:vertical;line-height:1.6}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:18px;box-shadow:var(--shadow)}
  .msg{font-size:13px;padding:10px 13px;border-radius:10px;margin:10px 0}
  .msg.err{background:var(--no-bg);color:var(--no)}
  .msg.okmsg{background:var(--accent-soft);color:var(--accent)}
  .authtabs{display:flex;gap:6px;margin-bottom:14px}
  .authtab{flex:1;padding:9px;border:1px solid var(--line);background:var(--bg);
    border-radius:10px;font-size:14px;font-weight:600;color:var(--sub);cursor:pointer}
  .authtab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .hint{font-size:12px;color:var(--sub)}

  .ptitle{font-size:13px;color:var(--sub);margin:4px 2px 12px}
  .who{font-size:12px;color:var(--sub);text-align:right;margin-bottom:10px}
  .who a{color:var(--accent);cursor:pointer;text-decoration:underline}

  /* 오답 패널 */
  .wrongpanel{border:1px solid #f0d9b8;background:var(--warn-bg);border-radius:16px;
    padding:14px 16px;margin-bottom:18px}
  .wrongpanel .wt{font-size:14px;font-weight:700;color:var(--warn);margin-bottom:10px}

  /* 도서관 */
  .book{border:1px solid var(--line);border-radius:16px;background:var(--card);
    margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow)}
  .bookh{width:100%;display:flex;align-items:center;gap:9px;background:none;border:none;
    padding:16px 18px;font-size:16px;font-weight:700;color:var(--ink);cursor:pointer;text-align:left}
  .bookh .cnt{font-size:12px;font-weight:500;color:var(--sub);margin-left:auto;margin-right:4px}
  .bookh .chev{transition:transform .2s;color:var(--sub);font-size:18px}
  .book.open .bookh .chev{transform:rotate(90deg)}
  .bookbody{display:none;padding:0 16px 14px}
  .book.open .bookbody{display:block}
  .unith{font-size:12px;color:var(--accent);font-weight:700;margin:12px 4px 8px;
    border-left:3px solid var(--accent-soft);padding-left:9px}
  .psg{display:flex;align-items:center;gap:10px;width:100%;text-align:left;
    background:var(--bg);border:1px solid var(--line);border-radius:12px;
    padding:13px 15px;font-size:15px;color:var(--ink);cursor:pointer;margin-bottom:8px;
    transition:border-color .15s,transform .08s}
  .psg:hover{border-color:var(--accent)}.psg:active{transform:scale(.99)}
  .psg .cnt{font-size:11px;color:var(--sub);margin-left:auto}
  .psg.wrong{border-color:#f0d9b8;background:#fff}

  /* 풀이 보드 */
  .board{display:flex;flex-direction:column;gap:10px;margin-top:6px}
  .cardx{display:flex;align-items:stretch;gap:10px;background:var(--card);
    border:1px solid var(--line);border-radius:14px;padding:12px 12px 12px 14px;
    box-shadow:var(--shadow);transition:border-color .15s,background .2s}
  .cardx.dragging{opacity:.45}
  .cardx.over{border-color:var(--accent);border-style:dashed}
  .cardx .num{flex:0 0 26px;height:26px;border-radius:8px;background:var(--bg);
    color:var(--sub);font-size:13px;font-weight:600;display:flex;align-items:center;
    justify-content:center;align-self:center}
  .cardx .txt{flex:1;font-size:15px;padding:2px 0;word-break:break-word}
  .cardx .arrows{display:flex;flex-direction:column;gap:4px;justify-content:center}
  .cardx .arrows button{width:34px;height:26px;border:1px solid var(--line);
    background:var(--bg);border-radius:8px;font-size:13px;color:var(--ink);cursor:pointer;line-height:1}
  .cardx .arrows button:active{background:var(--accent-soft)}
  .cardx .grip{flex:0 0 18px;align-self:center;color:#cfccc3;cursor:grab;font-size:16px;
    user-select:none;touch-action:none;padding:4px 2px}
  .cardx .grip:active{cursor:grabbing}
  .cardx .mark{align-self:center;font-weight:700;font-size:15px}
  .cardx .mark.ok{color:var(--ok)} .cardx .mark.no{color:var(--no)}
  .cardx.ok{background:var(--ok-bg);border-color:#bfe0cf}
  .cardx.ok .num{background:var(--ok);color:#fff}
  .cardx.no{background:var(--no-bg);border-color:#eecbc4}
  .cardx.no .num{background:var(--no);color:#fff}

  .bar{position:fixed;left:0;right:0;bottom:58px;background:rgba(246,245,241,.96);
    backdrop-filter:blur(8px);border-top:1px solid var(--line);padding:12px 18px;
    display:flex;gap:10px;max-width:640px;margin:0 auto;align-items:center;z-index:21}
  .bar .result{flex:1;font-size:14px;color:var(--sub)}
  .bar .result b{color:var(--ink)}
  .btn{border:none;border-radius:12px;padding:13px 18px;font-size:15px;font-weight:600;cursor:pointer}
  .btn.primary{background:var(--accent);color:#fff}
  .btn.ghost{background:var(--card);color:var(--ink);border:1px solid var(--line)}
  .btn:active{transform:scale(.98)}
  .btn.full{width:100%;margin-top:12px}

  .back{display:inline-flex;align-items:center;gap:6px;background:none;border:none;
    color:var(--sub);font-size:14px;cursor:pointer;padding:6px 2px;margin-bottom:8px}
  .empty{text-align:center;color:var(--sub);font-size:14px;padding:50px 0}
  .done{text-align:center;background:var(--accent-soft);border:1px solid #bfe0cf;
    border-radius:14px;padding:16px;color:var(--accent);font-weight:600;margin-top:4px}
  .loading{display:flex;align-items:center;justify-content:center;gap:9px;
    color:var(--sub);padding:50px 0;font-size:14px}
  .spinner{width:18px;height:18px;border:2px solid var(--line);border-top-color:var(--accent);
    border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .btn[disabled]{opacity:.6;cursor:default}
  /* 단색 라인 아이콘 */
  .ic{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;
    stroke-linecap:round;stroke-linejoin:round;flex:0 0 auto;vertical-align:-2px}
  .ic.muted{stroke:var(--sub)} .ic.ok{stroke:var(--accent)} .ic.warn{stroke:var(--warn)}
  .ic.sm{width:13px;height:13px}

  /* 온보딩 */
  .ob{position:fixed;inset:0;background:rgba(43,42,39,.45);display:flex;
    align-items:center;justify-content:center;z-index:50;padding:20px}
  .ob-card{background:#fff;border-radius:20px;padding:24px 22px 18px;max-width:340px;width:100%;
    box-shadow:0 12px 44px rgba(0,0,0,.18);text-align:center}
  .ob-card h3{margin:6px 0 8px;font-size:18px;letter-spacing:-.01em}
  .ob-card p{margin:0;color:var(--sub);font-size:14px;min-height:42px}
  .ob-dots{display:flex;gap:6px;justify-content:center;margin:18px 0 16px}
  .ob-dots i{width:7px;height:7px;border-radius:50%;background:var(--line);transition:.2s}
  .ob-dots i.on{background:var(--accent);width:18px;border-radius:4px}
  .ob-btns{display:flex;gap:8px}
  .demo{display:flex;flex-direction:column;gap:8px;margin:4px auto;width:210px;height:124px;
    justify-content:flex-end;overflow:hidden}
  .demo-row{height:36px;border-radius:9px;background:var(--bg);border:1px solid var(--line);
    display:flex;align-items:center;gap:8px;padding:0 12px;font-size:13px;color:var(--sub)}
  .demo-row .g{color:#cfccc3;font-size:14px}
  .demo-row.move{background:#fff;border-color:var(--accent);color:var(--ink);position:relative;
    z-index:2;box-shadow:var(--shadow);animation:demoMove 2.8s ease-in-out infinite}
  @keyframes demoMove{
    0%{transform:translateY(0) scale(1);opacity:0}
    8%{opacity:1} 22%{transform:translateY(0) scale(1.05)}
    55%{transform:translateY(-88px) scale(1.05)} 72%{transform:translateY(-88px) scale(1)}
    92%{opacity:1} 100%{transform:translateY(-88px) scale(1);opacity:0}}
  .obpulse{animation:obpulse 1.6s ease-in-out infinite}
  @keyframes obpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}

  /* 2단계: 끌기 + 화살표 둘 다 */
  .demo2{display:flex;flex-direction:column;gap:14px;height:124px;justify-content:center}
  .drow{display:flex;align-items:center;gap:10px}
  .dcap{font-size:11px;color:var(--sub);width:46px;text-align:right;flex:0 0 auto}
  .dcard{flex:1;height:38px;border-radius:9px;background:#fff;border:1px solid var(--accent);
    box-shadow:var(--shadow);display:flex;align-items:center;gap:8px;padding:0 12px;font-size:12px;color:var(--ink)}
  .dcard .g{color:#cfccc3;font-size:14px}
  .dcard.drag{animation:dragY 1.7s ease-in-out infinite}
  @keyframes dragY{0%,100%{transform:translateY(6px) scale(1)}50%{transform:translateY(-8px) scale(1.04)}}
  .dcard.arr{justify-content:space-between;animation:nudge 1.7s ease-in-out infinite}
  .dcard.arr .ac{display:flex;flex-direction:column;font-size:9px;line-height:1.1;color:var(--sub);align-items:center}
  @keyframes nudge{0%,45%,100%{transform:translateY(6px)}62%,86%{transform:translateY(-9px)}}
  .dcard.arr .up{display:inline-block;animation:press 1.7s ease-in-out infinite}
  @keyframes press{0%,50%,100%{color:var(--sub);transform:scale(1)}60%{color:var(--accent);transform:scale(1.45)}}

  /* 3단계: 이유 쓰기 */
  .rdemo{height:124px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
  .rq{font-size:12px;color:var(--sub)}
  .rwrite{position:relative;width:180px;height:34px;border:1px solid var(--line);border-radius:9px;background:#fff}
  .rfill{position:absolute;left:12px;top:18px;height:2px;background:var(--accent);width:0;
    animation:write 2.8s ease-in-out infinite}
  @keyframes write{0%{width:0;opacity:1}68%{width:150px}84%{width:150px;opacity:1}100%{width:150px;opacity:0}}
  .rpen{position:absolute;top:8px;left:8px;animation:penMove 2.8s ease-in-out infinite}
  @keyframes penMove{0%{transform:translateX(0)}68%{transform:translateX(150px)}84%,100%{transform:translateX(150px)}}

  /* 하단 탭바 */
  .tabbar{position:fixed;left:0;right:0;bottom:0;max-width:640px;margin:0 auto;
    background:rgba(246,245,241,.96);backdrop-filter:blur(8px);border-top:1px solid var(--line);
    display:flex;z-index:20}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;
    border:none;padding:9px 0 11px;font-size:11px;color:var(--sub);cursor:pointer}
  .tab .ic{width:21px;height:21px;stroke:currentColor}
  .tab.active{color:var(--accent)}
  .stats3{display:flex;gap:10px;margin-bottom:8px}
  .stat{flex:1;background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:16px 8px;text-align:center;box-shadow:var(--shadow)}
  .stat b{display:block;font-size:24px;color:var(--ink)}
  .stat span{font-size:12px;color:var(--sub)}
  /* 내 기록 상세 */
  .rec{border:1px solid #eecbc4;background:var(--no-bg);border-radius:14px;padding:12px 14px;margin-bottom:10px}
  .rec.solved{border-color:#bfe0cf;background:var(--accent-soft)}
  .rec .rh{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600}
  .rec .badge{font-size:11px;font-weight:700;padding:2px 9px;border-radius:999px;color:#fff;background:var(--no)}
  .rec .badge.ok{background:var(--accent)}
  .rec .when{margin-left:auto;font-size:11px;color:var(--sub);font-weight:500}
  .ord{display:flex;gap:8px;font-size:13px;padding:6px 9px;border-radius:8px;margin-top:6px;background:#fff}
  .ord .p{flex:0 0 20px;text-align:center;color:var(--sub);font-size:12px;align-self:center}
  .ord .s{flex:1}
  .ord .fix{flex:0 0 auto;font-size:11px;color:var(--no);align-self:center}
  .ord.good{opacity:.55}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>문장 순서 맞추기</h1>
    <p>흩어진 문장을 올바른 순서로 배열해보세요</p>
  </header>

  <!-- 로그인 / 회원가입 -->
  <div id="login" style="display:none">
    <div class="card">
      <div class="authtabs">
        <button id="tabLogin" class="authtab active" onclick="setMode('login')">로그인</button>
        <button id="tabSignup" class="authtab" onclick="setMode('signup')">회원가입</button>
      </div>
      <label id="nameLabel" style="display:none">이름</label>
      <input id="name" placeholder="이름" style="display:none">
      <label>이메일</label>
      <input id="email" type="email" placeholder="이메일">
      <label>비밀번호</label>
      <input id="pw" type="password" placeholder="비밀번호 (6자 이상)">
      <div id="loginmsg"></div>
      <button id="authbtn" class="btn primary full" onclick="submitAuth()">로그인</button>
      <p id="authhint" class="hint" style="text-align:center;margin-top:10px"></p>
    </div>
  </div>

  <!-- 본문 -->
  <div id="app" style="display:none"></div>
</div>

<!-- 하단 탭바 -->
<div id="tabbar" class="tabbar" style="display:none">
  <button class="tab active" data-t="play" onclick="navTab('play')"><svg class="ic" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg><span>풀기</span></button>
  <button class="tab" data-t="wrong" onclick="navTab('wrong')"><svg class="ic" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg><span>오답노트</span></button>
  <button class="tab" data-t="me" onclick="navTab('me')"><svg class="ic" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><span>내 기록</span></button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
const app=document.getElementById('app');
let state=[], current=null, allP=[], session=null, wrongIds=new Set(), myAtts=[], solving=false;
let everWrong=new Set();   // 이번 세션에서 한 번이라도 자리를 틀린 문장(원래 인덱스)

function nat(a,b){return String(a||'').localeCompare(String(b||''),'ko',{numeric:true,sensitivity:'base'});}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
const PATHS={
  book:'<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>',
  rotate:'<polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>',
  check:'<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>',
  edit:'<path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/>'
};
function ic(name,extra){return `<svg class="ic ${extra||''}" viewBox="0 0 24 24">${PATHS[name]||''}</svg>`;}

// ---------- 온보딩 (첫 방문 안내) ----------
const OB_KEY='so_onboarded_v1';
function demoHTML(){return `<div class="demo">
  <div class="demo-row"><span class="g">⠿</span> 첫 번째 문장</div>
  <div class="demo-row"><span class="g">⠿</span> 두 번째 문장</div>
  <div class="demo-row move"><span class="g">⠿</span> 이 문장을 위로</div>
</div>`;}
function motion2HTML(){return `<div class="demo2">
  <div class="drow"><span class="dcap">끌어서</span><div class="dcard drag"><span class="g">⠿</span> 문장</div></div>
  <div class="drow"><span class="dcap">또는</span><div class="dcard arr"><span>문장</span><span class="ac"><span class="up">▲</span><span>▼</span></span></div></div>
</div>`;}
function reflectDemoHTML(){return `<div class="rdemo">
  <div class="rq">“왜 이 문장이 여기에 올까요?”</div>
  <div class="rwrite"><div class="rfill"></div><svg class="ic ok rpen" viewBox="0 0 24 24" style="width:15px;height:15px">${PATHS.edit}</svg></div>
</div>`;}
const OB=[
  {v:demoHTML, t:'순서를 맞추는 연습', d:'흩어진 영어 문장을 올바른 순서로 배열하는 거예요.'},
  {v:motion2HTML, t:'끌거나 화살표로 이동', d:'⠿ 손잡이를 잡고 끌거나, ▲ ▼ 버튼으로 위치를 옮기세요.'},
  {v:reflectDemoHTML, t:'왜 그런지 적어보기', d:'순서를 맞추면 “확인”! 틀렸던 문장은 왜 그 자리인지 이유도 적어봐요.'}
];
let obStep=0;
function showOnboarding(){
  obStep=0;
  let el=document.getElementById('ob');
  if(!el){ el=document.createElement('div'); el.id='ob'; el.className='ob'; document.body.appendChild(el); }
  obRender();
}
function obRender(){
  const s=OB[obStep], last=obStep===OB.length-1;
  const dots=OB.map((_,i)=>`<i class="${i===obStep?'on':''}"></i>`).join('');
  document.getElementById('ob').innerHTML=`<div class="ob-card">
    ${s.v()}
    <h3>${s.t}</h3>
    <p>${s.d}</p>
    <div class="ob-dots">${dots}</div>
    <div class="ob-btns">
      <button class="btn ghost" style="flex:1" onclick="obClose()">건너뛰기</button>
      <button class="btn primary" style="flex:1" onclick="${last?'obClose()':'obNext()'}">${last?'시작하기':'다음'}</button>
    </div>
  </div>`;
}
function obNext(){ obStep++; obRender(); }
function obClose(){ try{ localStorage.setItem(OB_KEY,'1'); }catch(_){} const el=document.getElementById('ob'); if(el) el.remove(); }

// ---------- 인증 ----------
async function init(){
  if(typeof SUPABASE_URL==='undefined'||SUPABASE_URL.includes('여기에')){
    app.style.display='block';
    app.innerHTML=`<div class="empty">아직 Supabase 연결 전이에요.<br>config.js에 키를 넣어주세요.</div>`;
    return;
  }
  const { data:{ session:s } } = await db.auth.getSession();
  s ? enter(s) : showLogin();
}
let authMode='login';
function setMode(m){
  authMode=m;
  $('tabLogin').classList.toggle('active',m==='login');
  $('tabSignup').classList.toggle('active',m==='signup');
  $('authbtn').textContent = m==='login' ? '로그인' : '회원가입';
  $('authhint').textContent = m==='signup' ? '가입하면 바로 시작할 수 있어요.' : '';
  $('name').style.display = m==='signup' ? 'block' : 'none';
  $('nameLabel').style.display = m==='signup' ? 'block' : 'none';
  $('loginmsg').innerHTML='';
}
function submitAuth(){ authMode==='login' ? login() : signup(); }
function setBusy(btn,on,txt){
  if(!btn) return;
  if(on){ btn.dataset.label=btn.textContent; btn.textContent=txt||'처리 중…'; btn.disabled=true; }
  else { btn.textContent=btn.dataset.label||btn.textContent; btn.disabled=false; }
}

async function login(){
  const email=$('email').value.trim(), password=$('pw').value;
  const btn=$('authbtn'); setBusy(btn,true,'로그인 중…');
  const { data, error } = await db.auth.signInWithPassword({ email, password });
  if(error){ setBusy(btn,false); $('loginmsg').innerHTML=`<div class="msg err">${error.message}</div>`; return; }
  enter(data.session);
}
async function signup(){
  const name=$('name').value.trim();
  const email=$('email').value.trim(), password=$('pw').value;
  if(!name){ $('loginmsg').innerHTML=`<div class="msg err">이름을 입력하세요</div>`; return; }
  if(!email){ $('loginmsg').innerHTML=`<div class="msg err">이메일을 입력하세요</div>`; return; }
  if(password.length<6){ $('loginmsg').innerHTML=`<div class="msg err">비밀번호는 6자 이상이어야 해요</div>`; return; }
  const btn=$('authbtn'); setBusy(btn,true,'가입 중…');
  const { data, error } = await db.auth.signUp({ email, password, options:{ data:{ name } } });
  if(error){ setBusy(btn,false); $('loginmsg').innerHTML=`<div class="msg err">${error.message}</div>`; return; }
  if(data.session){ enter(data.session); }          // 이메일 확인 OFF → 바로 입장
  else {                                            // 이메일 확인 ON → 안내
    setBusy(btn,false);
    $('loginmsg').innerHTML=`<div class="msg okmsg">가입됐어요! 이제 '로그인' 탭에서 로그인하세요.</div>`;
    setMode('login');
  }
}
async function logout(){ await db.auth.signOut(); location.reload(); }
function showLogin(){ $('login').style.display='block'; app.style.display='none'; }
function enter(s){
  session=s; $('login').style.display='none'; app.style.display='block'; loadData();
  let seen=true; try{ seen=!!localStorage.getItem(OB_KEY); }catch(_){}
  if(!seen) showOnboarding();
}
function $(id){return document.getElementById(id);}

// ---------- 데이터 로드 + 탭 ----------
let curTab='play';
async function loadData(){
  app.innerHTML=`<div class="loading"><span class="spinner"></span>불러오는 중…</div>`;
  const [pRes,aRes]=await Promise.all([
    db.from('passages').select('*'),
    db.from('attempts').select('*').order('created_at',{ascending:false})
  ]);
  if(pRes.error){ app.innerHTML=`<div class="empty">불러오기 실패 😢<br>${pRes.error.message}</div>`; return; }
  allP=pRes.data||[];
  myAtts=(!aRes.error&&aRes.data)?aRes.data:[];
  // 내 최신 시도 기준 오답 지문
  wrongIds=new Set();
  const latest={};
  for(const a of myAtts){ if(!(a.passage_id in latest)) latest[a.passage_id]=a; }
  for(const pid in latest){ if(!latest[pid].is_correct) wrongIds.add(pid); }
  showTab(curTab);
}
function showTabBar(on){ const t=$('tabbar'); if(t) t.style.display=on?'flex':'none'; }
function showTab(t){
  curTab=t;
  document.querySelectorAll('#tabbar .tab').forEach(b=>b.classList.toggle('active',b.dataset.t===t));
  removeBar(); showTabBar(true);
  if(t==='wrong') renderWrong();
  else if(t==='me') renderMe();
  else renderLibrary();
}
function topBar(){
  const myName=session?((session.user.user_metadata&&session.user.user_metadata.name)||session.user.email):'';
  return `<div class="who">${myName?esc(myName)+'님 · ':''}<a onclick="showOnboarding()">사용법</a> · <a onclick="logout()">로그아웃</a></div>`;
}
function renderLibrary(){
  if(!allP.length){ app.innerHTML=topBar()+`<div class="empty">아직 등록된 지문이 없어요.</div>`; return; }
  const groups=buildGroups(allP);
  let html=topBar()+`<div class="ptitle">교재를 펼쳐 지문을 선택하세요</div>`;
  let first=true;
  for(const [book,units] of groups){
    const total=Object.values(units).reduce((n,a)=>n+a.length,0);
    html+=`<div class="book${first?' open':''}"><button class="bookh" onclick="this.closest('.book').classList.toggle('open')">
      <span class="chev">›</span> ${ic('book','muted')} ${esc(book)} <span class="cnt">${total}개</span></button><div class="bookbody">`;
    for(const unit of Object.keys(units)){
      if(unit) html+=`<div class="unith">${esc(unit)}</div>`;
      for(const p of units[unit]){
        const w=wrongIds.has(p.id)?' '+ic('rotate','sm warn'):'';
        html+=`<button class="psg" onclick="pick('${p.id}')">${esc(p.title)}${w}<span class="cnt">문장 ${p.sentences.length}</span></button>`;
      }
    }
    html+=`</div></div>`;
    first=false;
  }
  app.innerHTML=html;
}
function renderWrong(){
  const wrongList=allP.filter(p=>wrongIds.has(p.id))
    .sort((a,b)=>nat(a.book,b.book)||nat(a.unit,b.unit)||nat(a.title,b.title));
  let html=topBar()+`<div class="ptitle">틀렸던 지문을 다시 풀어보세요</div>`;
  if(!wrongList.length){ html+=`<div class="empty">${ic('check','ok')} 지금은 틀린 지문이 없어요!</div>`; }
  else for(const p of wrongList){
    const label=[p.book,p.unit,p.title].filter(Boolean).join(' · ');
    html+=`<button class="psg wrong" onclick="pick('${p.id}')">${esc(label)}<span class="cnt">문장 ${p.sentences.length}</span></button>`;
  }
  app.innerHTML=html;
}
function renderMe(){
  const latest={}, attempted=new Set();
  for(const a of myAtts){ attempted.add(a.passage_id); if(!(a.passage_id in latest)) latest[a.passage_id]=a; }
  const total=attempted.size;
  const solved=Object.values(latest).filter(a=>a.is_correct).length;
  const acc=total?Math.round(solved/total*100):0;
  let html=topBar()+`<div class="ptitle">내 학습 기록</div>`;
  html+=`<div class="stats3">
    <div class="stat"><b>${total}</b><span>푼 지문</span></div>
    <div class="stat"><b>${solved}</b><span>해결</span></div>
    <div class="stat"><b>${acc}%</b><span>정답률</span></div>
  </div>`;
  if(!myAtts.length){ html+=`<div class="empty">아직 푼 기록이 없어요.<br>‘풀기’에서 시작해보세요!</div>`; }
  else{
    const attemptedList=allP.filter(p=>latest[p.id])
      .sort((a,b)=>nat(a.book,b.book)||nat(a.unit,b.unit)||nat(a.title,b.title));
    html+=`<div class="ptitle" style="margin-top:18px">지문별 기록 (눌러서 풀이 보기)</div>`;
    for(const p of attemptedList){
      const ok=latest[p.id].is_correct;
      const label=[p.book,p.unit,p.title].filter(Boolean).join(' · ');
      html+=`<button class="psg" onclick="showMyRecord('${p.id}')">${esc(label)}<span class="cnt">${ok?ic('check','ok'):ic('rotate','warn')}</span></button>`;
    }
  }
  app.innerHTML=html;
}
function fmt(ts){ try{const d=new Date(ts);return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}catch(e){return '';} }
function myOrderLines(p,a){
  return (a.submitted||[]).map((origIdx,pos)=>{
    const ok=origIdx===pos;
    return `<div class="ord ${ok?'good':''}"><span class="p">${pos+1}</span>
      <span class="s">${esc(p.sentences[origIdx]||'')}</span>
      ${ok?'':`<span class="fix">→ ${origIdx+1}번</span>`}</div>`;
  }).join('');
}
function showMyRecord(pid){
  const p=allP.find(x=>x.id===pid); if(!p) return;
  removeBar(); showTabBar(true);
  const list=myAtts.filter(a=>a.passage_id===pid).slice().reverse(); // 시간순
  const label=[p.book,p.unit,p.title].filter(Boolean).join(' · ');
  let html=`<button class="back" onclick="showTab('me')">‹ 내 기록</button>
    <div style="font-weight:600;margin:0 2px 12px">${esc(label)}</div>`;
  if(!list.length) html+=`<div class="empty">이 지문 기록이 없어요.</div>`;
  else list.forEach((a,n)=>{
    html+=`<div class="rec ${a.is_correct?'solved':''}">
      <div class="rh"><span class="badge ${a.is_correct?'ok':''}">${a.is_correct?'정답':'오답'} ${a.score}/${a.total}</span>
        <span class="when">${n+1}차 · ${fmt(a.created_at)}</span></div>
      <div style="margin-top:6px">${myOrderLines(p,a)}</div></div>`;
  });
  html+=`<button class="btn primary full" style="margin-top:14px;margin-bottom:80px" onclick="pick('${p.id}')">이 지문 다시 풀기</button>`;
  app.innerHTML=html;
}
// 풀이 화면 떠나기 가드
function tryLeave(go){
  if(solving && !(state.length && state.every((s,i)=>s.idx===i))){
    if(!confirm('아직 다 맞히지 못했어요. 나가면 지금 배열은 저장되지 않아요. 나갈까요?')) return;
  }
  solving=false; go();
}
function leaveSolve(){ tryLeave(()=>loadData()); }
function navTab(t){ if(solving) tryLeave(()=>{ curTab=t; loadData(); }); else showTab(t); }

function buildGroups(list){
  const sorted=[...list].sort((a,b)=> nat(a.book,b.book)||nat(a.unit,b.unit)||nat(a.title,b.title));
  const map=new Map();
  for(const p of sorted){
    const b=p.book||'미분류', u=p.unit||'';
    if(!map.has(b)) map.set(b,{});
    const units=map.get(b); (units[u]=units[u]||[]).push(p);
  }
  return map;
}

// ---------- 풀이 ----------
function pick(id){
  current=allP.find(p=>p.id===id); if(!current) return;
  solving=true; showTabBar(true);
  everWrong=new Set();
  const sents=current.sentences;
  let order=sents.map((t,i)=>({idx:i,text:t}));
  state=shuffle(order, sents.length);
  render();
}
function shuffle(arr,n){
  let a=arr.slice();
  if(n>1){ do{ for(let i=a.length-1;i>0;i--){const j=Math.floor(rnd()*(i+1));[a[i],a[j]]=[a[j],a[i]];} }while(a.every((x,i)=>x.idx===i)); }
  return a;
}
let _seed=(new Date().getTime?new Date().getTime():12345)%2147483647;
function rnd(){ _seed=(_seed*16807)%2147483647; return (_seed-1)/2147483646; }

// 셸(뒤로가기·제목·보드틀)은 한 번만, 이후엔 보드만 갱신 → 깜빡임·스크롤 튐 방지
function render(checked){
  if(!document.getElementById('boardEl')){
    const head=[current.book,current.unit,current.title].filter(Boolean).join(' · ');
    app.innerHTML=`
      <button class="back" onclick="leaveSolve()">‹ 지문 목록</button>
      <div style="font-weight:600;margin:0 2px 12px">${esc(head)}</div>
      <div id="done"></div>
      <div class="board" id="boardEl"></div>
      <div style="height:150px"></div>`;
  }
  updateBoard(!!checked);
}
function updateBoard(checked){
  const cards=state.map((s,i)=>{
    let cls='cardx'; if(checked){ cls+= s.idx===i?' ok':' no'; }
    const mark=checked?(s.idx===i?'<span class="mark ok">✓</span>':'<span class="mark no">✗</span>'):'';
    return `<div class="${cls}" data-pos="${i}" data-idx="${s.idx}">
      <span class="grip" aria-label="끌어서 이동">⠿</span><span class="num">${i+1}</span>
      <span class="txt">${esc(s.text)}</span>${mark}
      <span class="arrows">
        <button onclick="move(${i},-1)" ${i===0?'disabled style=opacity:.3':''} aria-label="위로">▲</button>
        <button onclick="move(${i},1)" ${i===state.length-1?'disabled style=opacity:.3':''} aria-label="아래로">▼</button>
      </span></div>`;
  }).join('');
  document.getElementById('boardEl').innerHTML=cards;

  let done='';
  if(checked && state.every((s,i)=>s.idx===i)){
    done=`<div class="done">${ic('check','ok')} 완벽해요! 전부 맞았어요`;
    if(everWrong.size>0) done+=`<div style="margin-top:12px"><button class="btn primary" onclick="renderReflection()">${ic('edit')} 틀렸던 문장, 왜 여기일까 써보기</button></div>`;
    done+=`</div>`;
  }
  document.getElementById('done').innerHTML=done;

  let bar=document.getElementById('bar');
  if(!bar){ bar=document.createElement('div'); bar.id='bar'; bar.className='bar'; document.body.appendChild(bar); }
  const correct=state.filter((s,i)=>s.idx===i).length;
  const allCorrect=correct===state.length;
  let actions;
  if(!checked){
    actions=`<button class="btn ghost" onclick="pick(current.id)">섞기</button>
             <button class="btn primary" onclick="check()">확인</button>`;
  }else if(allCorrect){
    actions=`<button class="btn primary" onclick="pick(current.id)">새로 섞어 다시 풀기</button>`;
  }else{
    actions=`<button class="btn ghost" onclick="pick(current.id)">새로 섞기</button>
             <button class="btn primary" onclick="render()">재시도</button>`;
  }
  bar.innerHTML=`
    <div class="result">${checked?`<b>${correct}/${state.length}</b> 맞았어요`:'순서를 맞춘 뒤 확인하세요'}</div>
    ${actions}`;
  enableDrag();
}
function removeBar(){ const b=document.getElementById('bar'); if(b) b.remove(); }
function move(i,dir){ const j=i+dir; if(j<0||j>=state.length) return; [state[i],state[j]]=[state[j],state[i]]; render(); }

async function check(){
  const submitted=state.map(s=>s.idx);
  const correct=state.filter((s,i)=>s.idx===i).length;
  const isC=correct===state.length;
  // 자리를 틀린 문장 기록(원래 인덱스)
  state.forEach((s,i)=>{ if(s.idx!==i) everWrong.add(s.idx); });
  render(true);
  // 결과 저장(정답·오답 모두)
  const studentName=(session.user.user_metadata&&session.user.user_metadata.name)||session.user.email;
  try{
    await db.from('attempts').insert({
      passage_id:current.id, score:correct, total:state.length, is_correct:isC,
      submitted, user_id:session.user.id, student_email:session.user.email, student_name:studentName
    });
  }catch(e){ /* 저장 실패해도 풀이는 계속 */ }
}

// ---------- 이유 쓰기(메타인지) ----------
function renderReflection(){
  solving=false; removeBar();
  const targets=[...everWrong].sort((a,b)=>a-b); // 정답 순서대로
  const head=[current.book,current.unit,current.title].filter(Boolean).join(' · ');
  const items=targets.map(idx=>`
    <div class="card" style="margin-bottom:10px">
      <div style="font-size:12px;color:var(--sub)">정답 ${idx+1}번째 문장</div>
      <div style="margin:6px 0 10px">${esc(current.sentences[idx])}</div>
      <textarea id="r_${idx}" rows="2" placeholder="왜 이 문장이 여기에 올까요? (연결어·지시어 this/it·시제·흐름 등 근거로)"></textarea>
    </div>`).join('');
  app.innerHTML=`
    <button class="back" onclick="loadData()">‹ 지문 목록</button>
    <div style="font-weight:600;margin:0 2px 6px">${esc(head)}</div>
    <p class="hint" style="margin:0 2px 14px">틀렸던 문장이에요. 왜 그 자리에 오는지 직접 설명해보면 훨씬 오래 남아요.</p>
    ${items}
    <div id="reflmsg"></div>
    <button class="btn primary full" onclick="saveReflection()">제출하기</button>`;
}

async function saveReflection(){
  const targets=[...everWrong].sort((a,b)=>a-b);
  const notes=targets.map(idx=>({
    position:idx+1, sentence:current.sentences[idx],
    reason:(document.getElementById('r_'+idx).value||'').trim()
  }));
  const studentName=(session.user.user_metadata&&session.user.user_metadata.name)||session.user.email;
  const btn=event&&event.target; setBusy(btn,true,'제출 중…');
  const { error } = await db.from('reflections').insert({
    passage_id:current.id, user_id:session.user.id,
    student_email:session.user.email, student_name:studentName, notes
  });
  if(error){
    setBusy(btn,false);
    $('reflmsg').innerHTML=`<div class="msg err">저장 실패: ${error.message}</div>`;
    return;
  }
  app.innerHTML=`<div class="done" style="margin-top:30px">${ic('check','ok')} 잘 제출했어요!<br>선생님이 확인할 거예요. 수고했어요</div>
    <button class="btn ghost full" style="margin-top:16px" onclick="loadData()">지문 목록으로</button>`;
}

// 포인터 기반 드래그 — 터치(폰)·마우스(노트북) 모두 작동
// 이벤트를 문서 전체에서 받아, 카드가 이동해도 놓기를 놓치지 않음
let dragEl=null;
function enableDrag(){
  const board=document.getElementById('boardEl'); if(!board) return;
  board.querySelectorAll('.grip').forEach(g=>g.addEventListener('pointerdown',gripDown));
}
function gripDown(e){
  e.preventDefault();
  dragEl=e.currentTarget.closest('.cardx'); if(!dragEl) return;
  dragEl.classList.add('dragging');
  document.addEventListener('pointermove',gripMove,{passive:false});
  document.addEventListener('pointerup',gripUp);
  document.addEventListener('pointercancel',gripUp);
}
function gripMove(e){
  if(!dragEl) return;
  e.preventDefault();
  const board=document.getElementById('boardEl'); if(!board) return;
  const y=e.clientY;
  const cards=[...board.querySelectorAll('.cardx')];
  const di=cards.indexOf(dragEl);
  for(let k=0;k<cards.length;k++){
    if(cards[k]===dragEl) continue;
    const r=cards[k].getBoundingClientRect();
    const mid=r.top+r.height/2;
    if(di<k && y>mid){ board.insertBefore(dragEl,cards[k].nextSibling); renumber(board); break; }
    if(di>k && y<mid){ board.insertBefore(dragEl,cards[k]); renumber(board); break; }
  }
}
function renumber(board){
  [...board.querySelectorAll('.cardx')].forEach((c,i)=>{ const n=c.querySelector('.num'); if(n) n.textContent=i+1; });
}
function gripUp(){
  document.removeEventListener('pointermove',gripMove);
  document.removeEventListener('pointerup',gripUp);
  document.removeEventListener('pointercancel',gripUp);
  if(!dragEl) return;
  dragEl.classList.remove('dragging');
  const board=document.getElementById('boardEl');
  const order=[...board.querySelectorAll('.cardx')].map(c=>+c.dataset.idx);
  state=order.map(idx=>({idx,text:current.sentences[idx]}));
  dragEl=null;
  updateBoard(false); // 상태 확정 + 번호 갱신
}

init();
</script>
